random_state: 42
paths:
  raw_data: data/raw/vacancies.csv
  sample_data: data/samples/vacancies_sample.csv
  processed_data: data/processed/vacancies.csv
  artifacts: artifacts
  reports: reports
  skills: configs/skills.yaml
split:
  train_size: 0.70
  validation_size: 0.15
  test_size: 0.15
  min_valid_dates_ratio: 0.80
tfidf:
  min_df: 1
  max_features: 10000
  ngram_range: [1, 2]
logistic_regression:
  C: 1.0
  max_iter: 1000
ridge:
  alpha: 10.0
training:
  min_role_rows: 18
  min_salary_rows: 12
match:
  text_weight: 0.6
  skill_weight: 0.4
  neutral_skill_coverage: 0.5
salary:
  min: 20000
  max: 1000000

